	var mydiv=document.getElementById('data');
	const getdata=(obj)=>{
	
		for(value of obj)
			{
				var html=`
					<tr>
						<td>${value.id}</td>
						<td>${value.userId}</td>
						<td>${value.title}</td>
						<td>${value.body}</td>
					</tr>
				`;
				mydiv.insertAdjacentHTML('beforeend',html);
			}
	}
	
	
	fetch(`https://jsonplaceholder.typicode.com/posts`)
	.then((res)=>res.json())
	.then((myobj)=> getdata(myobj)) //console.log(myobj));
	
	
</script>
