<!--

localStorage and sessionStorage are both part of the Web Storage API, 
providing a way for browsers to store key-value pairs locally. The primary 
difference between them is the duration and scope of the stored data. 

Persistence (Lifetime):

localStorage data persists indefinitely. It remains available even after the browser 
is closed and reopened. Data must be explicitly deleted via JavaScript or 
by clearing the browser cache.

sessionStorage data is temporary. It is cleared automatically when the 
page session ends, typically when the specific browser tab or window is closed.
It does, however, survive page reloads and restores.




Scope (Accessibility):

localStorage is scoped to the origin (domain and protocol). 
Data is shared across all tabs and windows that have the same origin.

sessionStorage is scoped to the origin and the specific tab 
(top-level browsing context). 
Data is unique to each tab; opening the same page in a new tab creates a separate 
sessionStorage instance.


Storage Capacity:

Both typically offer much more space than cookies (which are limited to 4KB).
localStorage usually allows for 5MB to 10MB per origin.
sessionStorage often has a similar or slightly smaller limit, frequently cited 
around 5MB. 
-->
